<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Insights Feed — UniMatch Blog</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/main.js" defer></script>
    <script src="js/blog.js" defer></script>
  </head>
  <body>

    <div id="site-header" data-active="blog"></div>

    <main class="wrap" style="padding-top: 30px; padding-bottom: 80px;">
      <div class="reveal" style="margin-bottom: 40px;">
        <span class="eyebrow">Knowledge Center</span>
        <h2>Strategic Insights & Strategy Guides</h2>
      </div>

      <div id="blogFilters" style="display: flex; gap: 8px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 4px;">
        </div>

      <div class="blog-grid" id="blogGrid" style="margin-bottom: 60px;">
        </div>

      <div class="visa-card" style="max-width: 600px; padding: 30px; background: var(--surface);">
        <h3>Local Contributor Publisher</h3>
        <p style="font-size: 0.9rem; color: var(--cream-dim); margin-bottom: 20px;">Test out posting guides or updates onto your local layout instance instantly.</p>
        <button class="btn btn-primary btn-sm" onclick="alert('Publisher form module ready. Local administrative configurations are managed inside custom extensions.')">Launch Dynamic Form</button>
        <div id="adminPostList" style="margin-top: 20px;"></div>
      </div>
    </main>

    <div id="site-footer"></div>

  </body>
</html>
