<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visa & Financial Regulations Hub — UniMatch</title>
  <link rel="stylesheet" href="style.css">
  <script src="js/main.js" defer></script>
  <script src="js/visa.js" defer></script>
</head>
<body>

  <div id="site-header" data-active="visa"></div>

  <main class="wrap" style="padding-top: 30px; padding-bottom: 80px;">
    <div class="reveal" style="margin-bottom: 40px;">
      <span class="eyebrow">Regulatory Compliance</span>
      <h2>Visa Hub & Documentation Guidelines</h2>
      <p style="color: var(--cream-dim); max-width: 600px; margin-top: 4px;">Track required proof thresholds, bank seasoning timeframes, and post-study opportunities across major targets.</p>
    </div>

    <div class="visa-grid" id="visaGrid" style="margin-bottom: 50px;">
      </div>

    <div class="footer-grid" style="gap: 40px; align-items: start;">
      <div class="visa-card" style="padding: 30px;">
        <span class="eyebrow">Financial Verification</span>
        <h3>Sponsor Verification Calculator</h3>
        <div style="margin: 20px 0;">
          <label class="field-label">Target Destination</label>
          <select id="sponsorCountrySelect" class="form-control" style="margin-bottom: 16px;"></select>
          <label class="field-label">Estimated Intended Statement Date</label>
          <input type="date" id="sponsorDate" class="form-control">
        </div>
        <div id="sponsorResult" style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; border: 1px solid var(--line);"></div>
      </div>

      <div class="visa-card" style="padding: 30px;">
        <span class="eyebrow">Post-Graduation Pathways</span>
        <h3>Work Visa Runway Timelines</h3>
        <div style="margin: 20px 0;">
          <label class="field-label">Select Country Domain</label>
          <select id="runwayCountrySelect" class="form-control"></select>
        </div>
        <div id="runwayResult" style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; border: 1px solid var(--line);"></div>
      </div>
    </div>

    <div style="margin-top: 60px; max-width: 700px;">
      <div class="visa-card" style="padding: 40px; position: relative;">
        <div id="interviewCard">
          </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid var(--line); padding-top: 20px;">
          <span id="interviewCounter" class="mono-num" style="color: var(--cream-45);">1 / 3</span>
          <div style="display: flex; gap: 10px;">
            <button id="interviewPrevBtn" class="btn btn-ghost btn-sm" style="border: 1px solid var(--line);">← Back</button>
            <button id="interviewNextBtn" class="btn btn-primary btn-sm">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

</body>
</html>
